<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAT Runner — WFP Supporter Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --wfp-blue: #0099D8;
    --wfp-blue-dark: #007AB8;
    --wfp-blue-deeper: #005A8E;
    --wfp-navy: #1A2B4A;
    --wfp-black: #1C1C1C;
    --bg: #F4F6F8;
    --surface: #FFFFFF;
    --surface2: #EEF2F6;
    --border: #D0DCE8;
    --text: #1A2B4A;
    --muted: #5A7490;
    --code-bg: #1A2B4A;
    --green: #2E9E5B;
    --green-bg: #E8F5EE;
    --red: #D63838;
    --red-bg: #FEF0F0;
    --amber: #E07B00;
    --amber-bg: #FFF4E0;
    --purple: #6B3FA0;
    --purple-bg: #F3EEF9;
  }

  /* Password gate */
  .pw-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow', sans-serif;
  }
  .pw-gate.hidden { display: none; }
  .pw-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2.5rem;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,99,176,0.1);
    text-align: center;
  }
  .pw-badge {
    display: inline-block;
    background: var(--wfp-blue);
    color: #fff;
    font-weight: 900;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.35rem 0.7rem;
    border-radius: 3px;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .pw-card h2 {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--wfp-navy);
    margin-bottom: 0.35rem;
  }
  .pw-card p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .pw-input {
    width: 100%;
    padding: 0.65rem 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    border: 2px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    background: var(--surface);
    text-align: center;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
  }
  .pw-input:focus { outline: none; border-color: var(--wfp-blue); box-shadow: 0 0 0 3px rgba(0,153,216,0.12); }
  .pw-input.error { border-color: var(--red); animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .pw-submit {
    width: 100%;
    margin-top: 1rem;
    padding: 0.65rem;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: none;
    border-radius: 5px;
    background: var(--wfp-blue);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .pw-submit:hover { background: var(--wfp-blue-dark); }
  .pw-error-msg {
    font-size: 0.78rem;
    color: var(--red);
    margin-top: 0.75rem;
    min-height: 1.2em;
    font-weight: 600;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    line-height: 1.7;
    min-height: 100vh;
  }

  .header {
    border-bottom: 3px solid var(--wfp-blue);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,99,176,0.08);
  }

  .logo { display: flex; align-items: center; gap: 0.75rem; }

  .logo-badge {
    background: var(--wfp-blue);
    color: #fff;
    font-weight: 900;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.6rem;
    border-radius: 3px;
    text-transform: uppercase;
    line-height: 1.2;
    text-align: center;
  }

  .logo-text {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--wfp-navy);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .logo-text span { color: var(--wfp-blue); }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
  }
  .stat-pill.pass { background: var(--green-bg); color: var(--green); }
  .stat-pill.fail { background: var(--red-bg); color: var(--red); }
  .stat-pill.skip { background: var(--amber-bg); color: var(--amber); }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .header-nav a {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-decoration: none;
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .header-nav a:hover { color: var(--wfp-blue); border-color: var(--wfp-blue); background: #EBF7FD; }
  .header-nav a.active { background: var(--wfp-blue); color: #fff; border-color: var(--wfp-blue); }

  .progress-wrap { text-align: right; }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.67rem;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    width: 180px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--wfp-blue);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .layout {
    display: grid;
    grid-template-columns: 270px 1fr;
    min-height: calc(100vh - 64px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    background: #fff;
  }

  .sidebar-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
    margin-bottom: 0.5rem;
    padding: 0 1.25rem 0 1.75rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.5rem 0.75rem 0.5rem 1.25rem;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
    border-left: 3px solid transparent;
    margin-bottom: 1px;
    user-select: none;
  }
  .nav-item:hover { color: var(--wfp-blue); background: #EBF7FD; }
  .nav-item.active { color: var(--wfp-blue); background: #EBF7FD; border-left-color: var(--wfp-blue); }
  .nav-item.complete { color: var(--green); }

  .nav-progress {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.7;
  }
  .nav-item.complete .nav-progress { color: var(--green); }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 0.75rem 1.25rem;
  }

  .main {
    padding: 2.5rem 3.5rem;
    max-width: 960px;
  }

  .section { display: none; }
  .section.active { display: block; animation: fadeUp 0.25s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--wfp-blue);
    padding-bottom: 1rem;
  }
  .section-header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--wfp-navy);
    margin-bottom: 0.25rem;
  }
  .section-header p {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .test-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .test-card:hover { box-shadow: 0 2px 12px rgba(0,99,176,0.07); }
  .test-card.passed { border-left: 4px solid var(--green); }
  .test-card.failed { border-left: 4px solid var(--red); }
  .test-card.skipped { border-left: 4px solid var(--amber); }
  .test-card.new-test { background: linear-gradient(135deg, #FFFDF5 0%, #FFFFFF 40%); }

  .test-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
  }

  .tc-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    background: var(--surface2);
    color: var(--wfp-blue-deeper);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 52px;
    text-align: center;
  }

  .tc-name {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .new-badge {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--amber-bg);
    color: var(--amber);
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .amended-badge {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--purple-bg);
    color: var(--purple);
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .r2-badge {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: #E0F2FE;
    color: #0369A1;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .r3-badge {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: #FCE7F3;
    color: #BE185D;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .tc-chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }
  .test-card.expanded .tc-chevron { transform: rotate(90deg); }

  .test-body {
    display: none;
    padding: 0 1.25rem 1.25rem 1.25rem;
    border-top: 1px solid var(--border);
  }
  .test-card.expanded .test-body { display: block; }

  .test-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-top: 1rem;
  }

  .test-field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .test-field .content {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-line;
  }

  .test-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    align-items: center;
  }

  .btn {
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    padding: 0.45rem 1rem;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .btn-pass {
    background: var(--green-bg);
    color: var(--green);
    border-color: var(--green);
  }
  .btn-pass:hover, .btn-pass.active { background: var(--green); color: #fff; }

  .btn-fail {
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red);
  }
  .btn-fail:hover, .btn-fail.active { background: var(--red); color: #fff; }

  .btn-skip {
    background: var(--amber-bg);
    color: var(--amber);
    border-color: var(--amber);
  }
  .btn-skip:hover, .btn-skip.active { background: var(--amber); color: #fff; }

  .btn-reset {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
    margin-left: auto;
  }
  .btn-reset:hover { background: var(--surface2); }

  .notes-input {
    width: 100%;
    margin-top: 0.75rem;
    padding: 0.6rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    resize: vertical;
    min-height: 56px;
    color: var(--text);
    background: var(--surface);
  }
  .notes-input:focus { outline: none; border-color: var(--wfp-blue); box-shadow: 0 0 0 3px rgba(0,153,216,0.12); }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--border);
  }
  .test-card.passed .status-dot { background: var(--green); }
  .test-card.failed .status-dot { background: var(--red); }
  .test-card.skipped .status-dot { background: var(--amber); }

  /* Summary dashboard at top */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.25rem;
    text-align: center;
  }
  .summary-card .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
  }
  .summary-card .lbl {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 0.35rem;
    font-weight: 600;
  }
  .summary-card.s-total .val { color: var(--wfp-navy); }
  .summary-card.s-pass .val { color: var(--green); }
  .summary-card.s-fail .val { color: var(--red); }
  .summary-card.s-skip .val { color: var(--amber); }
  .summary-card.s-rate .val { color: var(--wfp-blue); }

  /* Filter toolbar */
  .filter-bar {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    padding: 0.35rem 0.85rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active { background: var(--wfp-blue); color: #fff; border-color: var(--wfp-blue); }
  .filter-btn.active-new { background: var(--amber); color: #fff; border-color: var(--amber); }

  /* Export bar */
  .export-bar {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 2px solid var(--border);
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }
  .btn-export {
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    padding: 0.55rem 1.25rem;
    border-radius: 4px;
    border: 2px solid var(--wfp-blue);
    background: var(--wfp-blue);
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .btn-export:hover { background: var(--wfp-blue-dark); }
  .btn-export.secondary { background: transparent; color: var(--wfp-blue); }
  .btn-export.secondary:hover { background: #EBF7FD; }

  .priority-tag {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.12rem 0.4rem; border-radius: 3px;
  }
  .priority-tag.critical { background: var(--red-bg); color: var(--red); }
  .priority-tag.high { background: var(--amber-bg); color: var(--amber); }
  .priority-tag.medium { background: var(--purple-bg); color: var(--purple); }
  .priority-tag.low { background: var(--surface2); color: var(--muted); }

  /* Responsive */
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1.5rem; }
    .summary-bar { grid-template-columns: repeat(3, 1fr); }
    .test-grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
  }

  .section-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 0.5rem;
  }
  .section-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
    background: var(--wfp-blue);
  }

  .amendment-source {
    margin-top: 0.75rem;
    font-size: 0.75rem;
    color: var(--amber);
    font-weight: 600;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- Password Gate -->
<div class="pw-gate" id="pwGate">
  <div class="pw-card">
    <div class="pw-badge">Restricted Access</div>
    <h2>UAT Runner</h2>
    <p>This page is for authorized WFP testers only. Enter the access code to continue.</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="Access code" autocomplete="off">
    <button class="pw-submit" id="pwSubmit">Enter</button>
    <div class="pw-error-msg" id="pwError"></div>
  </div>
</div>

<!-- App (hidden until auth) -->
<div id="appWrap" style="display:none">

<div class="header">
  <div class="logo">
    <div class="logo-badge">UAT<br>RUNNER</div>
    <div class="logo-text">WFP <span>Supporter Portal</span></div>
  </div>
  <div class="header-nav">
    <a href="/">Training Course</a>
    <a href="/uat" class="active">UAT Runner</a>
  </div>
  <div class="header-stats" id="headerStats">
    <div class="stat-pill pass" id="hPass">&#10003; 0</div>
    <div class="stat-pill fail" id="hFail">&#10007; 0</div>
    <div class="stat-pill skip" id="hSkip">&#8212; 0</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">0 / 0 COMPLETE</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="mainContent"></main>
</div>

</div><!-- /appWrap -->

<script>
// ============================================================
// TEST DATA - All test cases from UAT Script v2.0
// ============================================================
const SECTIONS = [
  {
    id: "uat01", code: "UAT-01", title: "Design Kit & Branding",
    desc: "Validate portal UI conformity to WFP Design Kit: color scheme, typography, spacing, responsive behaviour. Includes Round 2 & Round 3 amendments.",
    tests: [
      { tc: "01.01", name: "WFP color scheme applied", steps: "1. Open portal URL in Chrome\n2. Inspect header, footer, button elements\n3. Verify primary blue (#0A6EB4) and accent colors match WFP brand", expected: "All UI elements use WFP brand colors per the Design Kit" },
      { tc: "01.02", name: "Typography matches WFP spec", steps: "1. Inspect heading fonts and body text\n2. Verify font family, sizes, and weights\n3. Check consistency across all pages", expected: "Typography matches WFP Design Kit specifications" },
      { tc: "01.03", name: "WFP logo renders correctly", steps: "1. Navigate to portal\n2. Verify header logo at correct size\n3. Check footer branding", expected: "WFP logo displays correctly in header and footer" },
      { tc: "01.04", name: "Reusable components styled consistently", steps: "1. Navigate through all portal pages\n2. Verify buttons, cards, input fields\n3. Confirm consistent styling", expected: "All reusable UI components render with consistent WFP styling" },
      { tc: "01.05", name: "SLDS utility classes applied", steps: "1. Inspect page source\n2. Verify SLDS classes on layout components\n3. Check spacing and grid alignment", expected: "SLDS utility classes correctly applied; layout aligns to grid" },
      { tc: "01.06", name: "Language selector in header/footer", steps: "1. Navigate to any portal page\n2. Locate language selector dropdown\n3. Verify it renders and is clickable", expected: "Language selector dropdown is visible and functional" },
      { tc: "01.07", name: "Footer content complete", steps: "1. Scroll to footer\n2. Verify WFP branding, legal links, privacy policy\n3. Verify language selector in footer", expected: "Footer contains all required branding, links, and legal text" },

// ============================================================
// STATE
// ============================================================
let state = {};
let activeSection = SECTIONS[0].id;
let activeFilter = 'all';

function initState() {
  SECTIONS.forEach(s => {
    s.tests.forEach(t => {
      const key = s.id + '_' + t.tc;
      if (!state[key]) state[key] = { status: '', notes: '' };
    });
  });
}

function saveState() {
  try { localStorage.setItem('wfp_uat', JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('wfp_uat');
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}

// ============================================================
// STATS
// ============================================================
function getStats() {
  let total = 0, passed = 0, failed = 0, skipped = 0;
  SECTIONS.forEach(s => {
    s.tests.forEach(t => {
      total++;
      const st = state[s.id + '_' + t.tc]?.status;
      if (st === 'pass') passed++;
      else if (st === 'fail') failed++;
      else if (st === 'skip') skipped++;
    });
  });
  return { total, passed, failed, skipped, completed: passed + failed + skipped };
}

function getSectionStats(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  let total = 0, passed = 0, failed = 0, skipped = 0;
  section.tests.forEach(t => {
    total++;
    const st = state[sectionId + '_' + t.tc]?.status;
    if (st === 'pass') passed++;
    else if (st === 'fail') failed++;
    else if (st === 'skip') skipped++;
  });
  return { total, passed, failed, skipped, completed: passed + failed + skipped };
}

// ============================================================
// RENDER
// ============================================================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-label">Test Sections</div>';
  SECTIONS.forEach(s => {
    const stats = getSectionStats(s.id);
    const isComplete = stats.completed === stats.total;
    const cls = [
      'nav-item',
      activeSection === s.id ? 'active' : '',
      isComplete ? 'complete' : ''
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" data-section="${s.id}">
      <span>${s.code}</span>
      <span style="flex:1;font-size:0.78rem">${s.title}</span>
      <span class="nav-progress">${stats.completed}/${stats.total}</span>
    </div>`;
  });

  html += '<div class="section-divider"></div>';
  html += '<div class="sidebar-label">Quick Actions</div>';
  html += `<div class="nav-item" id="navExport" style="color:var(--wfp-blue)">&#x2913; Export Results</div>`;
  html += `<div class="nav-item" id="navReset" style="color:var(--red)">&#x21BB; Reset All</div>`;

  sb.innerHTML = html;

  sb.querySelectorAll('[data-section]').forEach(el => {
    el.addEventListener('click', () => {
      activeSection = el.dataset.section;
      render();
    });
  });

  document.getElementById('navExport')?.addEventListener('click', exportCSV);
  document.getElementById('navReset')?.addEventListener('click', () => {
    if (confirm('Reset all test results? This cannot be undone.')) {
      state = {};
      initState();
      saveState();
      render();
    }
  });
}

function renderHeader() {
  const stats = getStats();
  document.getElementById('hPass').innerHTML = `&#10003; ${stats.passed}`;
  document.getElementById('hFail').innerHTML = `&#10007; ${stats.failed}`;
  document.getElementById('hSkip').innerHTML = `&#8212; ${stats.skipped}`;
  document.getElementById('progressLabel').textContent = `${stats.completed} / ${stats.total} COMPLETE`;
  document.getElementById('progressFill').style.width = `${(stats.completed / stats.total * 100) || 0}%`;
}

function renderMain() {
  const section = SECTIONS.find(s => s.id === activeSection);
  const stats = getStats();
  const sStats = getSectionStats(section.id);
  const newCount = section.tests.filter(t => t.isNew && !t.source).length;
  const r2Count = section.tests.filter(t => t.source === 'R2' || t.source === 'R2/R3').length;
  const r3Count = section.tests.filter(t => t.source === 'R3' || t.source === 'R2/R3').length;

  let html = '';

  // Summary bar
  html += `<div class="summary-bar">
    <div class="summary-card s-total"><div class="val">${stats.total}</div><div class="lbl">Total Tests</div></div>
    <div class="summary-card s-pass"><div class="val">${stats.passed}</div><div class="lbl">Passed</div></div>
    <div class="summary-card s-fail"><div class="val">${stats.failed}</div><div class="lbl">Failed</div></div>
    <div class="summary-card s-skip"><div class="val">${stats.skipped}</div><div class="lbl">Skipped</div></div>
    <div class="summary-card s-rate"><div class="val">${stats.completed ? Math.round(stats.passed / stats.completed * 100) : 0}%</div><div class="lbl">Pass Rate</div></div>
  </div>`;

  // Section header
  html += `<div class="section-header">
    <h1>${section.code}: ${section.title}</h1>
    <p>${section.desc}</p>
    <div style="display:flex;gap:1rem;margin-top:0.5rem;align-items:center">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted)">${sStats.completed}/${sStats.total} complete</span>
      ${newCount ? `<span class="new-badge">${newCount} new</span>` : ''}
      ${r2Count ? `<span class="r2-badge">${r2Count} from R2</span>` : ''}
      ${r3Count ? `<span class="r3-badge">${r3Count} from R3</span>` : ''}
    </div>
    <div class="section-progress-bar"><div class="section-progress-fill" style="width:${(sStats.completed/sStats.total*100)||0}%"></div></div>
  </div>`;

  // Filters
  html += `<div class="filter-bar">
    <button class="filter-btn ${activeFilter==='all'?'active':''}" data-filter="all">All (${section.tests.length})</button>
    <button class="filter-btn ${activeFilter==='pass'?'active':''}" data-filter="pass">Passed</button>
    <button class="filter-btn ${activeFilter==='fail'?'active':''}" data-filter="fail">Failed</button>
    <button class="filter-btn ${activeFilter==='skip'?'active':''}" data-filter="skip">Skipped</button>
    <button class="filter-btn ${activeFilter==='pending'?'active':''}" data-filter="pending">Pending</button>
    <button class="filter-btn ${activeFilter==='new'?'active-new':''}" data-filter="new">Amends</button>
    <button class="filter-btn ${activeFilter==='r2'?'active':''}" data-filter="r2">R2</button>
    <button class="filter-btn ${activeFilter==='r3'?'active':''}" data-filter="r3">R3</button>
  </div>`;

  // Test cards
  section.tests.forEach(t => {
    const key = section.id + '_' + t.tc;
    const s = state[key] || { status: '', notes: '' };

    // Filter
    if (activeFilter === 'pass' && s.status !== 'pass') return;
    if (activeFilter === 'fail' && s.status !== 'fail') return;
    if (activeFilter === 'skip' && s.status !== 'skip') return;
    if (activeFilter === 'pending' && s.status !== '') return;
    if (activeFilter === 'new' && !t.isNew) return;
    if (activeFilter === 'r2' && t.source !== 'R2' && t.source !== 'R2/R3') return;
    if (activeFilter === 'r3' && t.source !== 'R3' && t.source !== 'R2/R3') return;

    const cardCls = [
      'test-card',
      s.status === 'pass' ? 'passed' : '',
      s.status === 'fail' ? 'failed' : '',
      s.status === 'skip' ? 'skipped' : '',
      t.isNew ? 'new-test' : ''
    ].filter(Boolean).join(' ');

    const prioHtml = t.priority ? `<span class="priority-tag ${t.priority}">${t.priority}</span>` : '';

    html += `<div class="${cardCls}" data-key="${key}">
      <div class="test-header">
        <div class="status-dot"></div>
        <div class="tc-id">${t.tc}</div>
        <div class="tc-name">${t.name}</div>
        ${t.isNew && !t.source ? '<span class="new-badge">NEW</span>' : ''}
        ${t.source === 'R2' ? '<span class="r2-badge">R2</span>' : ''}
        ${t.source === 'R3' ? '<span class="r3-badge">R3</span>' : ''}
        ${t.source === 'R2/R3' ? '<span class="r2-badge">R2/R3</span>' : ''}
        ${prioHtml}
        <div class="tc-chevron">&#9654;</div>
      </div>
      <div class="test-body">
        <div class="test-grid">
          <div class="test-field">
            <label>Steps</label>
            <div class="content">${t.steps}</div>
          </div>
          <div class="test-field">
            <label>Expected Result</label>
            <div class="content">${t.expected}</div>
          </div>
        </div>
        ${t.isNew && !t.source ? '<div class="amendment-source">Source: Donor Portal Amends (for Tim)</div>' : ''}
        ${t.source === 'R2' ? '<div class="amendment-source">Source: Round 2 Feedback</div>' : ''}
        ${t.source === 'R3' ? '<div class="amendment-source">Source: Round 3 Feedback</div>' : ''}
        ${t.source === 'R2/R3' ? '<div class="amendment-source">Source: Round 2 &amp; Round 3 Feedback</div>' : ''}
        <div class="test-actions">
          <button class="btn btn-pass ${s.status==='pass'?'active':''}" data-action="pass" data-key="${key}">&#10003; Pass</button>
          <button class="btn btn-fail ${s.status==='fail'?'active':''}" data-action="fail" data-key="${key}">&#10007; Fail</button>
          <button class="btn btn-skip ${s.status==='skip'?'active':''}" data-action="skip" data-key="${key}">&#8212; Skip</button>
          <button class="btn btn-reset" data-action="reset" data-key="${key}">Reset</button>
        </div>
        <textarea class="notes-input" placeholder="Add notes, defect reference, or screenshot link..." data-notes="${key}">${s.notes || ''}</textarea>
      </div>
    </div>`;
  });

  // Export bar
  html += `<div class="export-bar">
    <button class="btn-export" onclick="exportCSV()">&#x2913; Export as CSV</button>
    <button class="btn-export secondary" onclick="exportJSON()">{ } Export as JSON</button>
    <span style="margin-left:auto;font-size:0.75rem;color:var(--muted)">Results saved in session</span>
  </div>`;

  document.getElementById('mainContent').innerHTML = html;

  // Event listeners
  document.querySelectorAll('.test-header').forEach(el => {
    el.addEventListener('click', () => {
      el.parentElement.classList.toggle('expanded');
    });
  });

  document.querySelectorAll('.filter-btn').forEach(el => {
    el.addEventListener('click', () => {
      activeFilter = el.dataset.filter;
      renderMain();
    });
  });

  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = el.dataset.key;
      const action = el.dataset.action;
      if (action === 'reset') {
        state[key] = { status: '', notes: state[key]?.notes || '' };
      } else {
        state[key] = { ...state[key], status: action };
      }
      saveState();
      render();
    });
  });

  document.querySelectorAll('[data-notes]').forEach(el => {
    el.addEventListener('input', (e) => {
      const key = el.dataset.notes;
      if (!state[key]) state[key] = { status: '', notes: '' };
      state[key].notes = e.target.value;
      saveState();
    });
    el.addEventListener('click', (e) => e.stopPropagation());
  });
}

function render() {
  renderSidebar();
  renderHeader();
  renderMain();
}

// ============================================================
// EXPORT
// ============================================================
function exportCSV() {
  let csv = 'Section,TC ID,Test Case,Status,Priority,Source,Notes\n';
  SECTIONS.forEach(s => {
    s.tests.forEach(t => {
      const key = s.id + '_' + t.tc;
      const st = state[key] || {};
      const notes = (st.notes || '').replace(/"/g, '""');
      const source = t.source || (t.isNew ? 'Amends' : 'Original');
      csv += `"${s.code}","${t.tc}","${t.name}","${st.status || 'pending'}","${t.priority || ''}","${source}","${notes}"\n`;
    });
  });
  download(csv, 'WFP_UAT_Results_' + new Date().toISOString().slice(0,10) + '.csv', 'text/csv');
}

function exportJSON() {
  const data = { exported: new Date().toISOString(), sections: [] };
  SECTIONS.forEach(s => {
    const sectionData = { code: s.code, title: s.title, tests: [] };
    s.tests.forEach(t => {
      const key = s.id + '_' + t.tc;
      const st = state[key] || {};
      sectionData.tests.push({ tc: t.tc, name: t.name, status: st.status || 'pending', notes: st.notes || '', isNew: !!t.isNew, priority: t.priority || '', source: t.source || '' });
    });
    data.sections.push(sectionData);
  });
  download(JSON.stringify(data, null, 2), 'WFP_UAT_Results_' + new Date().toISOString().slice(0,10) + '.json', 'application/json');
}

function download(content, filename, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ============================================================
// INIT
// ============================================================
function bootApp() {
  loadState();
  initState();
  render();
}

// ============================================================
// PASSWORD GATE
// ============================================================
const PW_HASH = '2485cd13'; // simple hash of 'wfp-uat-2026'
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return (h >>> 0).toString(16).slice(0, 8);
}

function checkAuth() {
  return localStorage.getItem('wfp_uat_auth') === PW_HASH;
}

function unlock() {
  document.getElementById('pwGate').classList.add('hidden');
  document.getElementById('appWrap').style.display = '';
  bootApp();
}

if (checkAuth()) {
  unlock();
} else {
  const inp = document.getElementById('pwInput');
  const btn = document.getElementById('pwSubmit');
  const err = document.getElementById('pwError');

  function tryAuth() {
    const val = inp.value.trim();
    if (simpleHash(val) === PW_HASH) {
      localStorage.setItem('wfp_uat_auth', PW_HASH);
      unlock();
    } else {
      inp.classList.add('error');
      err.textContent = 'Incorrect access code. Please try again.';
      setTimeout(() => inp.classList.remove('error'), 500);
    }
  }

  btn.addEventListener('click', tryAuth);
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryAuth(); });
  inp.focus();
}
</script>
